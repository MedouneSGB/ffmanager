<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 340px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #121214;
      color: #e1e1e6;
      margin: 0;
      padding: 15px;
    }
    h3 {
      margin-top: 0;
      color: #ffffff;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2b2b36;
      padding-bottom: 10px;
      font-weight: bold;
    }
    .stream-list {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    /* Personnalisation de la ScrollBar */
    .stream-list::-webkit-scrollbar {
      width: 6px;
    }
    .stream-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .stream-list::-webkit-scrollbar-thumb {
      background: #3b3b4a;
      border-radius: 3px;
    }
    .stream-list::-webkit-scrollbar-thumb:hover {
      background: #525266;
    }
    .stream-item {
      background-color: #1a1a24;
      border: 1px solid #2b2b36;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .stream-item:hover {
      border-color: #7c4dff;
    }
    .stream-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .badge {
      background-color: rgba(124, 77, 255, 0.15);
      color: #9e7dff;
      border: 1px solid #7c4dff;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: bold;
    }
    .stream-url {
      color: #7a7a8a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
    }
    .btn {
      background-color: #7c4dff;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 6px 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #9e7dff;
    }
    .btn:active {
      background-color: #5c35c2;
    }
    .empty-state {
      color: #7a7a8a;
      text-align: center;
      padding: 30px 10px;
      font-size: 13px;
      font-weight: bold;
      line-height: 1.5;
    }
    .status {
      font-size: 12px;
      text-align: center;
      color: #00e676;
      margin-top: 5px;
      font-weight: bold;
      display: none;
      padding: 6px;
      border-radius: 4px;
      background-color: rgba(0, 230, 118, 0.1);
    }
  </style>
</head>
<body>
  <h3>🎥 FFmpeg Studio Linker</h3>
  <div class="stream-list" id="streamList">
    <div class="empty-state">Aucun flux détecté sur cette page.<br>Lancez une vidéo pour capturer le lien.</div>
  </div>
  <div class="status" id="statusMsg">Envoyé avec succès !</div>
  <script src="popup.js"></script>
</body>
</html>
