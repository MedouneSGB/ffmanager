<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 340px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #121214;
      color: #e1e1e6;
      margin: 0;
      padding: 15px;
    }
    h3 {
      margin-top: 0;
      color: #ffffff;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2b2b36;
      padding-bottom: 10px;
      font-weight: bold;
    }
    .stream-list {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    /* Personnalisation de la ScrollBar */
    .stream-list::-webkit-scrollbar {
      width: 6px;
    }
    .stream-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .stream-list::-webkit-scrollbar-thumb {
      background: #3b3b4a;
      border-radius: 3px;
    }
    .stream-list::-webkit-scrollbar-thumb:hover {
      background: #525266;
    }
    .stream-item {
      background-color: #1a1a24;
      border: 1px solid #2b2b36;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .stream-item:hover {
      border-color: #7c4dff;
    }
    .stream-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .badge {
      background-color: rgba(124, 77, 255, 0.15);
      color: #9e7dff;
      border: 1px solid #7c4dff;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: bold;
    }
    .stream-url {
      color: #7a7a8a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
    }
    .btn {
      background-color: #7c4dff;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 6px 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #9e7dff;
    }
    .btn:active {
      background-color: #5c35c2;
    }
    .btn-play {
      background-color: #00e676;
      color: #121214;
    }
    .btn-play:hover {
      background-color: #33f093;
    }
    .btn-play:active {
      background-color: #00b050;
    }
    .empty-state {
      color: #7a7a8a;
      text-align: center;
      padding: 30px 10px;
      font-size: 13px;
      font-weight: bold;
      line-height: 1.5;
    }
    .status {
      font-size: 12px;
      text-align: center;
      color: #00e676;
      margin-top: 5px;
      font-weight: bold;
      display: none;
      padding: 6px;
      border-radius: 4px;
      background-color: rgba(0, 230, 118, 0.1);
    }
    /* Toggle Switch & Sponsor Button Styles */
    .switch-container {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #7a7a8a;
      font-weight: bold;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 28px;
      height: 16px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .switch-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #3b3b4a;
      transition: .3s;
    }
    .switch-slider:before {
      position: absolute;
      content: "";
      height: 10px;
      width: 10px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
    }
    input:checked + .switch-slider {
      background-color: #7c4dff;
    }
    input:checked + .switch-slider:before {
      transform: translateX(12px);
    }
    .switch-slider.round {
      border-radius: 16px;
    }
    .switch-slider.round:before {
      border-radius: 50%;
    }
    .btn-sponsor {
      background-color: rgba(0, 230, 118, 0.1);
      color: #00e676;
      border: 1px solid #00e676;
      padding: 3px 8px;
      font-size: 10px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .btn-sponsor:hover {
      background-color: rgba(0, 230, 118, 0.2);
    }
  </style>
</head>
<body>
  <h3><img src="icon.png" width="20" height="20" style="border-radius: 4px;"> FFmpeg Studio Linker</h3>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 2px;">
    <div class="switch-container">
      <label class="switch">
        <input type="checkbox" id="toggleExtension" checked>
        <span class="switch-slider round"></span>
      </label>
      <span id="toggleStatusLabel">Extension active</span>
    </div>
    <button id="sponsorBtn" class="btn-sponsor">💜 Soutenir</button>
  </div>
  <div class="stream-list" id="streamList">
    <div class="empty-state">
      Aucun flux détecté sur cette page.<br>Lancez une vidéo pour capturer le lien.
      <button id="refreshPageBtn" class="btn" style="margin-top: 14px; background-color: rgba(124, 77, 255, 0.1); border: 1px solid #7c4dff; color: #9e7dff; padding: 8px 16px; font-size: 11px; width: 100%; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: background-color 0.2s; cursor: pointer;">🔄 Rafraîchir la page</button>
    </div>
  </div>

  <!-- Panel de Téléchargement style IDM -->
  <div id="downloadPanel" style="display: none; background-color: #1a1a24; border: 1px solid #7c4dff; border-radius: 8px; padding: 12px; margin-top: 5px; font-size: 12px;">
    <h4 style="margin-top: 0; color: #ffffff; border-bottom: 1px solid #2b2b36; padding-bottom: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 13px;">
      <span style="display: flex; align-items: center; gap: 6px;">📥 Options de Téléchargement</span>
      <span id="closePanelBtn" style="cursor: pointer; font-size: 18px; color: #7a7a8a; font-weight: bold;">&times;</span>
    </h4>
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <div>
        <label style="display: block; margin-bottom: 4px; color: #7a7a8a; font-weight: bold; font-size: 10px;">URL DU FLUX</label>
        <input type="text" id="panelUrl" readonly style="width: 100%; box-sizing: border-box; background-color: #121214; border: 1px solid #2b2b36; color: #7a7a8a; padding: 6px; border-radius: 4px; font-family: monospace; font-size: 10px; outline: none;">
      </div>
      <div>
        <label style="display: block; margin-bottom: 4px; color: #e1e1e6; font-weight: bold; font-size: 10px;">NOM DU FICHIER</label>
        <input type="text" id="panelFileName" style="width: 100%; box-sizing: border-box; background-color: #121214; border: 1px solid #2b2b36; color: #ffffff; padding: 6px; border-radius: 4px; outline: none; font-size: 11px;">
      </div>
      <div>
        <label style="display: block; margin-bottom: 4px; color: #e1e1e6; font-weight: bold; font-size: 10px;">DOSSIER DE DESTINATION</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="panelDestFolder" readonly style="flex: 1; box-sizing: border-box; background-color: #121214; border: 1px solid #2b2b36; color: #ffffff; padding: 6px; border-radius: 4px; outline: none; font-size: 11px;">
          <button id="browseDestBtn" class="btn" style="background-color: #7c4dff; padding: 6px 10px; font-size: 10px; white-space: nowrap;">Parcourir...</button>
        </div>
      </div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <div style="flex: 1;">
          <label style="display: block; margin-bottom: 4px; color: #e1e1e6; font-weight: bold; font-size: 10px;">FORMAT / CONVERSION</label>
          <select id="panelFormat" style="width: 100%; box-sizing: border-box; background-color: #121214; border: 1px solid #2b2b36; color: #ffffff; padding: 5px; border-radius: 4px; outline: none; font-size: 11px;">
            <option value="mp4">Vidéo MP4 (Remux direct)</option>
            <option value="mp3">Audio MP3 (Extraction)</option>
          </select>
        </div>
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px;">
        <button id="cancelDownloadBtn" class="btn" style="background-color: #3b3b4a;">Annuler</button>
        <button id="startDownloadBtn" class="btn btn-play" style="font-weight: bold;">Démarrer</button>
      </div>
    </div>
  </div>

  <div class="status" id="statusMsg">Envoyé avec succès !</div>
  <script src="popup.js"></script>
</body>
</html>
